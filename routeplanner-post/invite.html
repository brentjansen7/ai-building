<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uitnodiging - Route Optimizer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            color: #1a1a1a;
        }
        .subtitle {
            color: #666;
            margin-bottom: 32px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .help-text {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #5568d3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .error {
            color: #dc3545;
            font-size: 14px;
            margin-bottom: 16px;
            padding: 12px;
            background: #f8d7da;
            border-radius: 6px;
        }
        .success {
            color: #155724;
            font-size: 14px;
            margin-bottom: 16px;
            padding: 12px;
            background: #d4edda;
            border-radius: 6px;
        }
        .loading { opacity: 0.6; pointer-events: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Route Optimizer</h1>
        <p class="subtitle">Je bent uitgenodigd voor het team</p>

        <div id="message"></div>

        <form id="inviteForm">
            <div class="form-group">
                <label for="fullName">Volledige naam</label>
                <input type="text" id="fullName" name="fullName" required />
            </div>

            <div class="form-group">
                <label for="password">Wachtwoord</label>
                <input type="password" id="password" name="password" required autocomplete="new-password" />
                <p class="help-text">Min. 8 karakters</p>
            </div>

            <button type="submit" id="submitBtn">Account aanmaken</button>
        </form>
    </div>

    <script src="config.js"></script>
    <script type="module">
        import { acceptInvite, onAuthStateChange } from './auth.js';

        const form = document.getElementById('inviteForm');
        const submitBtn = document.getElementById('submitBtn');
        const messageDiv = document.getElementById('message');

        // Get token from URL
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        if (!token) {
            messageDiv.innerHTML = '<div class="error">❌ Geen uitnodiging token gevonden</div>';
            form.style.display = 'none';
        }

        // Check if already logged in
        onAuthStateChange((event, session) => {
            if (session) {
                window.location.href = 'index.html';
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            form.classList.add('loading');
            messageDiv.innerHTML = '';

            const fullName = document.getElementById('fullName').value;
            const password = document.getElementById('password').value;

            if (password.length < 8) {
                messageDiv.innerHTML = '<div class="error">❌ Wachtwoord moet minstens 8 karakters zijn</div>';
                submitBtn.disabled = false;
                form.classList.remove('loading');
                return;
            }

            try {
                await acceptInvite(token, password, fullName);
                messageDiv.innerHTML = '<div class="success">✓ Account aangemaakt! Omleiding...</div>';
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 500);
            } catch (error) {
                let message = error.message;
                if (message.includes('expired')) {
                    message = 'Deze uitnodiging is verlopen';
                } else if (message.includes('already registered')) {
                    message = 'Dit email adres is al in gebruik';
                }
                messageDiv.innerHTML = `<div class="error">❌ ${message}</div>`;
                submitBtn.disabled = false;
                form.classList.remove('loading');
            }
        });
    </script>
</body>
</html>
