<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup - Route Optimizer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 500px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 32px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: monospace;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .help {
            font-size: 12px;
            color: #666;
            margin-top: 6px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #5568d3; }
        .message {
            margin-bottom: 16px;
            padding: 12px;
            border-radius: 6px;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Setup Route Optimizer</h1>
        <p class="subtitle">Configureer je Supabase credentials</p>

        <div id="message"></div>

        <form id="setupForm">
            <div class="form-group">
                <label for="url">Supabase URL</label>
                <input type="text" id="url" name="url" placeholder="https://xxxxx.supabase.co" required />
                <p class="help">Vind dit in Supabase → Project Settings → API</p>
            </div>

            <div class="form-group">
                <label for="key">Anon Public Key</label>
                <input type="password" id="key" name="key" placeholder="eyJhbGciOi..." required />
                <p class="help">Kopieer de "anon public" key (NIET de service_role key)</p>
            </div>

            <button type="submit">✓ Save & Go to Login</button>
        </form>
    </div>

    <script>
        // Pre-fill URL if available
        const urlInput = document.getElementById('url');
        if (window.ENV?.SUPABASE_URL) {
            urlInput.value = window.ENV.SUPABASE_URL;
            urlInput.disabled = true;
        }

        document.getElementById('setupForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const url = document.getElementById('url').value.trim();
            const key = document.getElementById('key').value.trim();

            if (!url.startsWith('https://') || !url.includes('supabase.co')) {
                document.getElementById('message').innerHTML = '<div class="message">❌ Invalid URL format</div>';
                return;
            }

            if (key.length < 50) {
                document.getElementById('message').innerHTML = '<div class="message">❌ Key seems too short (min 50 chars)</div>';
                return;
            }

            // Save to window.ENV (this will be read by auth.js on next page load)
            window.ENV = {
                SUPABASE_URL: url,
                SUPABASE_ANON_KEY: key,
            };

            // Also save to localStorage as fallback
            localStorage.setItem('ENV_SUPABASE_URL', url);
            localStorage.setItem('ENV_SUPABASE_ANON_KEY', key);

            document.getElementById('message').innerHTML = '<div class="message success">✓ Config saved! Redirecting...</div>';
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 500);
        });

        // Load from localStorage if available
        const savedUrl = localStorage.getItem('ENV_SUPABASE_URL');
        const savedKey = localStorage.getItem('ENV_SUPABASE_ANON_KEY');
        if (savedUrl && savedKey) {
            window.ENV = {
                SUPABASE_URL: savedUrl,
                SUPABASE_ANON_KEY: savedKey,
            };
            document.getElementById('message').innerHTML = '<div class="message info">ℹ️ Config found! <a href="login.html" style="color:#0c5460;font-weight:bold;">Go to Login →</a></div>';
        }
    </script>
</body>
</html>
