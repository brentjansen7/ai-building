<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bedrijfsgegevens - Route Optimizer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 500px;
        }
        h1 { font-size: 26px; margin-bottom: 8px; color: #1a1a1a; }
        .subtitle { color: #666; margin-bottom: 28px; font-size: 14px; }
        .welcome {
            background: #eef2ff;
            color: #3730a3;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .form-group { margin-bottom: 18px; }
        label {
            display: block;
            margin-bottom: 6px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: #667eea; }
        .help-text { font-size: 12px; color: #666; margin-top: 4px; }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #5568d3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .error {
            color: #dc3545;
            font-size: 14px;
            margin-bottom: 16px;
            padding: 12px;
            background: #f8d7da;
            border-radius: 6px;
        }
        .success {
            color: #155724;
            font-size: 14px;
            margin-bottom: 16px;
            padding: 12px;
            background: #d4edda;
            border-radius: 6px;
        }
        .loading { opacity: 0.6; pointer-events: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Nog één stap</h1>
        <p class="subtitle">Vul je bedrijfsgegevens in om te beginnen</p>

        <div class="welcome" id="welcome"></div>
        <div id="message"></div>

        <form id="profileForm">
            <div class="form-group">
                <label for="companyName">Bedrijfsnaam</label>
                <input type="text" id="companyName" name="companyName" required />
            </div>

            <div class="form-group">
                <label for="kvk">KvK-nummer</label>
                <input type="text" id="kvk" name="kvk" required placeholder="12345678" />
                <p class="help-text">Handelsregister nummer (8 cijfers)</p>
            </div>

            <div class="form-group">
                <label for="billingAddress">Facturatieadres</label>
                <input type="text" id="billingAddress" name="billingAddress" required placeholder="Straat 123, 1234AB Plaats" />
            </div>

            <button type="submit" id="submitBtn">Account voltooien</button>
        </form>
    </div>

    <script src="config.js"></script>
    <script type="module">
        import { getCurrentUser, ensureProfileExists, completeOAuthProfile, signOut } from './auth.js';

        const form = document.getElementById('profileForm');
        const submitBtn = document.getElementById('submitBtn');
        const messageDiv = document.getElementById('message');
        const welcomeDiv = document.getElementById('welcome');

        const user = await getCurrentUser();
        if (!user) {
            window.location.href = 'login.html';
        } else if (await ensureProfileExists(user)) {
            // Profiel bestaat al → niets in te vullen
            window.location.href = 'index.html';
        } else {
            const name = user.user_metadata?.full_name || user.email;
            welcomeDiv.textContent = `Welkom ${name}! Vul hieronder je bedrijfsgegevens in.`;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            form.classList.add('loading');
            messageDiv.innerHTML = '';

            const companyName = document.getElementById('companyName').value.trim();
            const kvk = document.getElementById('kvk').value.trim();
            const billingAddress = document.getElementById('billingAddress').value.trim();

            try {
                const currentUser = await getCurrentUser();
                if (!currentUser) throw new Error('Geen actieve sessie. Log opnieuw in.');
                await completeOAuthProfile(currentUser, companyName, kvk, billingAddress);
                messageDiv.innerHTML = '<div class="success">✓ Account voltooid! Omleiding…</div>';
                setTimeout(() => { window.location.href = 'index.html'; }, 600);
            } catch (error) {
                let message = error.message;
                if (error.message?.includes('duplicate') || error.message?.includes('unique')) {
                    message = 'Dit KvK-nummer is al geregistreerd';
                }
                messageDiv.innerHTML = `<div class="error">❌ ${message}</div>`;
                submitBtn.disabled = false;
                form.classList.remove('loading');
            }
        });
    </script>
</body>
</html>
