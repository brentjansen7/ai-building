<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inloggen… - Route Optimizer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 { font-size: 22px; margin-bottom: 8px; color: #1a1a1a; }
        p { color: #666; font-size: 14px; }
        .spinner {
            width: 36px;
            height: 36px;
            margin: 24px auto;
            border: 3px solid #eee;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error {
            color: #dc3545;
            background: #f8d7da;
            padding: 12px;
            border-radius: 6px;
            margin-top: 16px;
            font-size: 14px;
            text-align: left;
        }
        a { color: #667eea; text-decoration: none; font-weight: 600; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="title">Even geduld…</h1>
        <p id="subtitle">Je wordt ingelogd.</p>
        <div class="spinner" id="spinner"></div>
        <div id="message"></div>
    </div>

    <script type="module">
        import { supabase, getCurrentUser, ensureProfileExists } from './auth.js';

        const titleEl = document.getElementById('title');
        const subtitleEl = document.getElementById('subtitle');
        const spinnerEl = document.getElementById('spinner');
        const messageEl = document.getElementById('message');

        function showError(text) {
            titleEl.textContent = 'Er ging iets mis';
            subtitleEl.textContent = '';
            spinnerEl.style.display = 'none';
            messageEl.textContent = '';
            const errDiv = document.createElement('div');
            errDiv.className = 'error';
            errDiv.textContent = text;
            const linkP = document.createElement('p');
            linkP.style.marginTop = '16px';
            const link = document.createElement('a');
            link.href = 'login.html';
            link.textContent = 'Terug naar inloggen';
            linkP.appendChild(link);
            messageEl.appendChild(errDiv);
            messageEl.appendChild(linkP);
        }

        // OAuth fout in URL hash (bv. user_denied_access)
        const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ''));
        const oauthError = hashParams.get('error_description') || hashParams.get('error');
        if (oauthError) {
            showError(decodeURIComponent(oauthError.replace(/\+/g, ' ')));
        } else {
            handleSession().catch(err => showError(err.message || String(err)));
        }

        async function handleSession() {
            // Wacht tot Supabase de URL hash heeft verwerkt en sessie heeft opgeslagen
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                await routeUser();
                return;
            }

            // Anders: luister tot SIGNED_IN event komt (max 8 seconden)
            await new Promise((resolve, reject) => {
                const timeout = setTimeout(() => {
                    sub.subscription.unsubscribe();
                    reject(new Error('Inloggen duurde te lang. Probeer opnieuw.'));
                }, 8000);

                const sub = supabase.auth.onAuthStateChange((event, sess) => {
                    if (event === 'SIGNED_IN' && sess) {
                        clearTimeout(timeout);
                        sub.subscription.unsubscribe();
                        routeUser().then(resolve, reject);
                    }
                });
            });
        }

        async function routeUser() {
            const user = await getCurrentUser();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            const hasProfile = await ensureProfileExists(user);
            window.location.href = hasProfile ? 'index.html' : 'complete-profile.html';
        }
    </script>
</body>
</html>
