<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account aanmaken - Route Optimizer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 500px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            color: #1a1a1a;
        }
        .subtitle {
            color: #666;
            margin-bottom: 32px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .help-text {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #5568d3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .error {
            color: #dc3545;
            font-size: 14px;
            margin-bottom: 16px;
            padding: 12px;
            background: #f8d7da;
            border-radius: 6px;
        }
        .success {
            color: #155724;
            font-size: 14px;
            margin-bottom: 16px;
            padding: 12px;
            background: #d4edda;
            border-radius: 6px;
        }
        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }
        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .login-link a:hover { text-decoration: underline; }
        .loading { opacity: 0.6; pointer-events: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Route Optimizer</h1>
        <p class="subtitle">14 dagen gratis proberen</p>

        <div id="message"></div>

        <form id="signupForm">
            <div class="form-group">
                <label for="companyName">Bedrijfsnaam</label>
                <input type="text" id="companyName" name="companyName" required />
            </div>

            <div class="form-group">
                <label for="kvk">KvK-nummer</label>
                <input type="text" id="kvk" name="kvk" required placeholder="12345678" />
                <p class="help-text">Handelsregister nummer (8 cijfers)</p>
            </div>

            <div class="form-group">
                <label for="billingAddress">Facturatieadres</label>
                <input type="text" id="billingAddress" name="billingAddress" required placeholder="Straat 123, 1234AB Plaats" />
            </div>

            <div class="form-group">
                <label for="email">Email (inloggegevens bedrijfseigenaar)</label>
                <input type="email" id="email" name="email" required autocomplete="email" />
            </div>

            <div class="form-group">
                <label for="password">Wachtwoord</label>
                <input type="password" id="password" name="password" required autocomplete="new-password" />
                <p class="help-text">Min. 8 karakters</p>
            </div>

            <button type="submit" id="submitBtn">Account aanmaken</button>
        </form>

        <div class="login-link">
            Al een account? <a href="login.html">Inloggen</a>
        </div>
    </div>

    <script src="config.js"></script>
    <script type="module">
        import { signUp, onAuthStateChange } from './auth.js';

        const form = document.getElementById('signupForm');
        const submitBtn = document.getElementById('submitBtn');
        const messageDiv = document.getElementById('message');

        // Check if already logged in
        onAuthStateChange((event, session) => {
            if (session) {
                window.location.href = 'index.html';
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            form.classList.add('loading');
            messageDiv.innerHTML = '';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const companyName = document.getElementById('companyName').value;
            const kvk = document.getElementById('kvk').value;
            const billingAddress = document.getElementById('billingAddress').value;

            if (password.length < 8) {
                messageDiv.innerHTML = '<div class="error">❌ Wachtwoord moet minstens 8 karakters zijn</div>';
                submitBtn.disabled = false;
                form.classList.remove('loading');
                return;
            }

            try {
                await signUp(email, password, companyName, kvk, billingAddress);
                messageDiv.innerHTML = '<div class="success">✓ Account aangemaakt! Omleiding naar login...</div>';
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1000);
            } catch (error) {
                let message = error.message;
                if (error.message.includes('already registered')) {
                    message = 'Dit email adres is al in gebruik';
                } else if (error.message.includes('KvK')) {
                    message = 'Dit KvK-nummer is al geregistreerd';
                }
                messageDiv.innerHTML = `<div class="error">❌ ${message}</div>`;
                submitBtn.disabled = false;
                form.classList.remove('loading');
            }
        });
    </script>
</body>
</html>
