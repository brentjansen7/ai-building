<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 90" width="400" height="90">

  <!-- ===== ICON MARK ===== -->

  <!-- Large gear -->
  <circle cx="32" cy="76" r="12" fill="none" stroke="#00BDD4" stroke-width="6" stroke-dasharray="5.5 3.5"/>
  <circle cx="32" cy="76" r="8.5" fill="#00BDD4"/>
  <circle cx="32" cy="76" r="3.5" fill="#0a0a1a"/>

  <!-- Small gear -->
  <circle cx="50" cy="87" r="8" fill="none" stroke="#00BDD4" stroke-width="5" stroke-dasharray="4.5 2.8"/>
  <circle cx="50" cy="87" r="5.5" fill="#00BDD4"/>
  <circle cx="50" cy="87" r="2.2" fill="#0a0a1a"/>

  <!-- A shape — left leg -->
  <polygon points="62,87 72,87 88,16 79,16" fill="white"/>
  <!-- A shape — right leg -->
  <polygon points="86,16 95,16 111,87 101,87" fill="white"/>
  <!-- A shape — crossbar -->
  <polygon points="70,56 103,56 101,67 72,67" fill="white"/>

  <!-- Circuit traces on A (cyan) -->
  <line x1="75" y1="30" x2="38" y2="30" stroke="#00BDD4" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="30" x2="38" y2="46" stroke="#00BDD4" stroke-width="2" stroke-linecap="round"/>
  <circle cx="38" cy="46" r="4" fill="none" stroke="#00BDD4" stroke-width="2"/>
  <circle cx="56" cy="30" r="2.5" fill="#00BDD4"/>

  <line x1="73" y1="44" x2="28" y2="44" stroke="#00BDD4" stroke-width="2" stroke-linecap="round"/>
  <circle cx="28" cy="44" r="4" fill="none" stroke="#00BDD4" stroke-width="2"/>

  <line x1="70" y1="56" x2="52" y2="56" stroke="#00BDD4" stroke-width="2" stroke-linecap="round"/>
  <circle cx="52" cy="56" r="2.5" fill="#00BDD4"/>

  <!-- Node at peak -->
  <circle cx="86" cy="16" r="3" fill="#00BDD4"/>

  <!-- ===== WORDMARK ===== -->
  <text x="128" y="62"
    font-family="'Montserrat', 'Inter', 'Arial Black', Arial, sans-serif"
    font-size="48" font-weight="900" letter-spacing="1">
    <tspan fill="white">AUTO</tspan><tspan fill="#00BDD4">MADE</tspan>
  </text>

  <!-- Tagline -->
  <text x="130" y="83"
    font-family="'Inter', Arial, sans-serif"
    font-size="13" font-weight="400" fill="rgba(200,200,224,0.7)" letter-spacing="0.5">
    Krimpen aan den IJssel
  </text>

</svg>
