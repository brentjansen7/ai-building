<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">

  <!-- Large gear -->
  <circle cx="32" cy="82" r="12" fill="none" stroke="#00d4ff" stroke-width="6" stroke-dasharray="5.5 3.5"/>
  <circle cx="32" cy="82" r="8.5" fill="#00d4ff"/>
  <circle cx="32" cy="82" r="3.5" fill="#06060f"/>

  <!-- Small gear -->
  <circle cx="50" cy="93" r="8" fill="none" stroke="#00d4ff" stroke-width="5" stroke-dasharray="4.5 2.8"/>
  <circle cx="50" cy="93" r="5.5" fill="#00d4ff"/>
  <circle cx="50" cy="93" r="2.2" fill="#06060f"/>

  <!-- A shape — left leg -->
  <polygon points="62,93 72,93 88,12 79,12" fill="white"/>
  <!-- A shape — right leg -->
  <polygon points="86,12 95,12 111,93 101,93" fill="white"/>
  <!-- A shape — crossbar -->
  <polygon points="70,58 103,58 101,69 72,69" fill="white"/>

  <!-- Circuit traces (cyan matching website) -->
  <line x1="75" y1="28" x2="38" y2="28" stroke="#00d4ff" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="28" x2="38" y2="46" stroke="#00d4ff" stroke-width="2" stroke-linecap="round"/>
  <circle cx="38" cy="46" r="4" fill="none" stroke="#00d4ff" stroke-width="2"/>
  <circle cx="57" cy="28" r="2.5" fill="#00d4ff"/>

  <line x1="73" y1="44" x2="28" y2="44" stroke="#00d4ff" stroke-width="2" stroke-linecap="round"/>
  <circle cx="28" cy="44" r="4" fill="none" stroke="#00d4ff" stroke-width="2"/>

  <line x1="70" y1="58" x2="53" y2="58" stroke="#00d4ff" stroke-width="2" stroke-linecap="round"/>
  <circle cx="53" cy="58" r="2.5" fill="#00d4ff"/>

  <!-- Node at peak -->
  <circle cx="86" cy="12" r="3" fill="#00d4ff"/>

  <!-- Wordmark: AUTO white, MADE cyan -->
  <text x="128" y="64"
    font-family="'Montserrat', 'Inter', 'Arial Black', Arial, sans-serif"
    font-size="48" font-weight="900" letter-spacing="1">
    <tspan fill="white">AUTO</tspan><tspan fill="#00d4ff">MADE</tspan>
  </text>

  <!-- Tagline -->
  <text x="130" y="85"
    font-family="'Inter', Arial, sans-serif"
    font-size="13" font-weight="400" fill="rgba(200,200,224,0.65)" letter-spacing="0.5">
    Krimpen aan den IJssel
  </text>

</svg>
